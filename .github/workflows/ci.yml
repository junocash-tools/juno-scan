name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local
  RUST_TOOLCHAIN: 1.86.0

jobs:
  quality:
    name: formatting, modules, and vet
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: Check Go formatting
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            printf '%s\n' "$unformatted"
            exit 1
          fi

      - name: Check Rust formatting
        run: cargo fmt --manifest-path rust/scan/Cargo.toml -- --check

      - name: Check whitespace
        run: git diff --check

      - name: Check Go module files
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet Go packages
        shell: bash
        run: |
          set -euo pipefail
          CGO_ENABLED=0 go vet -mod=readonly ./...
          CGO_ENABLED=0 go vet -mod=readonly -tags=mysql ./...

  go-unit:
    name: Go unit (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            flags: ""
          - name: mysql
            flags: -tags=mysql
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go unit tests
        shell: bash
        run: CGO_ENABLED=0 go test -mod=readonly ${{ matrix.flags }} ./...

  rust-unit:
    name: Rust unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Run Rust unit tests
        run: cargo test --locked --manifest-path rust/scan/Cargo.toml

  race:
    name: Go race (Linux CGO)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Build Rust FFI library
        run: cargo build --locked --release --manifest-path rust/scan/Cargo.toml

      - name: Run Go race tests
        shell: bash
        run: |
          set -euo pipefail
          export LD_LIBRARY_PATH="$PWD/rust/scan/target/release${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          go test -mod=readonly -race -tags=mysql ./...
