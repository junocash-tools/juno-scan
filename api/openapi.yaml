openapi: 3.0.3
info:
  title: juno-scan HTTP API
  version: v1
servers:
  - url: http://127.0.0.1:8080
security:
  - bearerAuth: []
  - {}
paths:
  /v1/health:
    get:
      summary: Health / status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
  /v1/wallets:
    get:
      summary: List wallets
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWalletsResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: DB error
          content:
            text/plain:
              schema:
                type: string
    post:
      summary: Upsert wallet UFVK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertWalletRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpsertWalletResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
        "400":
          description: Invalid request
          content:
            text/plain:
              schema:
                type: string
        "409":
          description: Immutable wallet identity, duplicate UFVK, or forbidden birthday increase
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: Validation/DB error
          content:
            text/plain:
              schema:
                type: string
  /v1/wallets/{wallet_id}/events:
    get:
      summary: List wallet events
      parameters:
        - name: wallet_id
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          description: Must be a non-negative int64. Persist with event_epoch; reset when the epoch changes.
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 1000
            default: 100
        - name: block_height
          in: query
          required: false
          description: Filter to events emitted at a specific block height (debug/audit only; not recommended due to reorg risk).
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: kind
          in: query
          required: false
          description: Filter to one or more event kinds (repeat `kind=` or pass a comma-separated list).
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: txid
          in: query
          required: false
          description: Filter to events where `payload.txid` matches this txid (lowercase hex).
          schema:
            type: string
            pattern: "^[0-9a-f]{64}$"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWalletEventsResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
        "400":
          description: Invalid request
          content:
            text/plain:
              schema:
                type: string
        "409":
          description: Event journal changed during the read or cursor exceeds its durable maximum
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: DB error
          content:
            text/plain:
              schema:
                type: string
  /v1/wallets/{wallet_id}/backfill:
    get:
      summary: Read persisted historical backfill progress
      parameters:
        - name: wallet_id
          in: path
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Persisted progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillStatus"
        "404":
          description: Unknown wallet or progress
    post:
      summary: Backfill wallet history (incremental)
      parameters:
        - name: wallet_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackfillRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
        "400":
          description: Invalid request
          content:
            text/plain:
              schema:
                type: string
        "409":
          description: Non-contiguous or stale backfill progress
          content:
            text/plain:
              schema:
                type: string
        "503":
          description: Backfill not enabled
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: DB / RPC error
          content:
            text/plain:
              schema:
                type: string
  /v1/wallets/{wallet_id}/notes:
    get:
      summary: List wallet notes
      description: Returns incoming notes plus mined outgoing notes recovered via OVK. The `spent` filter applies to incoming notes only.
      parameters:
        - name: wallet_id
          in: path
          required: true
          schema:
            type: string
        - name: spent
          in: query
          required: false
          schema:
            type: string
            description: When set to true, include spent incoming notes
        - name: direction
          in: query
          required: false
          schema:
            type: string
            enum: [incoming, outgoing, all]
            default: all
            description: Filter note direction; outgoing notes are mined-only
        - name: min_value_zat
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 0
            description: Minimum note value in zatoshis
        - name: recipient_address
          in: query
          required: false
          schema:
            type: string
          description: Exact incoming recipient-address filter
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            description: Page size (default 1000)
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            description: Pagination cursor from a previous response
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWalletNotesResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
        "400":
          description: Invalid request
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: DB error
          content:
            text/plain:
              schema:
                type: string
  /v1/wallets/{wallet_id}/addresses/{address}/balance:
    get:
      summary: Balance for one address observed under a registered wallet UFVK
      parameters:
        - name: wallet_id
          in: path
          required: true
          schema: {type: string}
        - name: address
          in: path
          required: true
          schema: {type: string}
        - name: min_confirmations
          in: query
          required: false
          schema: {type: integer, format: int64, minimum: 0, default: 100}
      responses:
        "200":
          description: Balance buckets; an address with no notes returns zeros
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressBalanceResponse"
        "404":
          description: Unknown wallet
        "503":
          description: Scanner has no indexed tip
  /v1/orchard/witness:
    post:
      summary: Compute Orchard witnesses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WitnessRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WitnessResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
        "400":
          description: Invalid request
          content:
            text/plain:
              schema:
                type: string
        "409":
          description: Canonical anchor changed while the witness was computed; retry
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: DB / witness error
          content:
            text/plain:
              schema:
                type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthResponse:
      type: object
      required: [status, event_epoch, confirmations]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        ready:
          type: boolean
          description: True only with a scanned tip, acceptable node lag, and every enabled wallet complete beyond that tip with matching identity and birthday.
        event_epoch:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: Rotates once per scanner process start and after destructive event-journal reset or repair.
        network:
          type: string
          enum: [mainnet, testnet, regtest]
        ua_hrp:
          type: string
        confirmations:
          type: integer
          format: int64
          minimum: 1
          description: Configured confirmation threshold used for lifecycle events and default balance availability.
        scanned_height:
          type: integer
          format: int64
        scanned_hash:
          type: string
        node_height:
          type: integer
          format: int64
        scanner_lag:
          type: integer
          format: int64
        max_ready_lag:
          type: integer
          format: int64
        history_complete:
          type: boolean
        history_pending_wallets:
          type: integer
      additionalProperties: true
    Wallet:
      type: object
      required: [wallet_id, ufvk_fingerprint, birthday_height, created_at]
      properties:
        wallet_id:
          type: string
        ufvk_fingerprint:
          type: string
          pattern: "^[0-9a-f]{64}$"
        birthday_height:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        disabled_at:
          type: string
          format: date-time
      additionalProperties: true
    ListWalletsResponse:
      type: object
      required: [wallets]
      properties:
        wallets:
          type: array
          items:
            $ref: "#/components/schemas/Wallet"
      additionalProperties: true
    UpsertWalletRequest:
      type: object
      required: [wallet_id, ufvk]
      properties:
        wallet_id:
          type: string
        ufvk:
          type: string
        birthday_height:
          type: integer
          format: int64
          minimum: 0
          description: Defaults to zero for a new wallet; omission preserves an existing wallet birthday.
      additionalProperties: false
    UpsertWalletResponse:
      type: object
      required: [status, birthday_height, ufvk_fingerprint]
      properties:
        status:
          type: string
          enum: [ok]
        birthday_height:
          type: integer
          format: int64
        ufvk_fingerprint:
          type: string
          pattern: "^[0-9a-f]{64}$"
      additionalProperties: true
    WalletEvent:
      type: object
      required: [id, kind, height, payload, created_at]
      properties:
        id:
          type: integer
          format: int64
        kind:
          type: string
        height:
          type: integer
          format: int64
        payload:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
      additionalProperties: true
    ListWalletEventsResponse:
      type: object
      required: [event_epoch, events, next_cursor]
      properties:
        event_epoch:
          type: string
          pattern: "^[0-9a-f]{64}$"
        events:
          type: array
          items:
            $ref: "#/components/schemas/WalletEvent"
        next_cursor:
          type: integer
          format: int64
      additionalProperties: true
    BackfillRequest:
      type: object
      properties:
        from_height:
          type: integer
          format: int64
          minimum: 0
          description: Must equal the wallet's persisted next_height. Omit to use it automatically.
        to_height:
          type: integer
          format: int64
          minimum: 0
          description: If omitted, the current scanned tip height is used
        batch_size:
          type: integer
          format: int64
          minimum: 1
          maximum: 10000
          default: 100
      additionalProperties: false
    BackfillResponse:
      type: object
      required:
        - status
        - wallet_id
        - from_height
        - to_height
        - scanned_from
        - scanned_to
        - next_height
        - inserted_notes
        - inserted_events
      properties:
        status:
          type: string
          enum: [ok]
        wallet_id:
          type: string
        from_height:
          type: integer
          format: int64
        to_height:
          type: integer
          format: int64
        scanned_from:
          type: integer
          format: int64
        scanned_to:
          type: integer
          format: int64
        next_height:
          type: integer
          format: int64
        inserted_notes:
          type: integer
          format: int64
        inserted_events:
          type: integer
          format: int64
        visited_action_heights:
          type: integer
          format: int64
        skipped_heights:
          type: integer
          format: int64
        rpc_calls:
          type: integer
          format: int64
      additionalProperties: true
    BackfillStatus:
      type: object
      required: [wallet_id, ufvk_fingerprint, birthday_height, next_height, target_height, state, generation, updated_at]
      properties:
        wallet_id: {type: string}
        birthday_height: {type: integer, format: int64}
        ufvk_fingerprint: {type: string, pattern: "^[0-9a-f]{64}$"}
        next_height: {type: integer, format: int64}
        target_height: {type: integer, format: int64}
        state: {type: string, enum: [pending, running, complete, error]}
        last_error: {type: string}
        generation: {type: integer, format: int64, minimum: 1}
        updated_at: {type: string, format: date-time}
      additionalProperties: false
    AddressBalanceResponse:
      type: object
      required: [wallet_id, recipient_address, available_zat, pending_incoming_zat, pending_outgoing_zat, total_unspent_zat, min_confirmations, as_of_node_height, as_of_scanner_height, scanner_lag]
      properties:
        wallet_id: {type: string}
        recipient_address: {type: string}
        available_zat: {type: integer, format: int64}
        pending_incoming_zat: {type: integer, format: int64}
        pending_outgoing_zat: {type: integer, format: int64}
        total_unspent_zat: {type: integer, format: int64}
        min_confirmations: {type: integer, format: int64}
        as_of_node_height: {type: integer, format: int64}
        as_of_scanner_height: {type: integer, format: int64}
        scanner_lag: {type: integer, format: int64}
      additionalProperties: false
    WalletNote:
      type: object
      required: [direction, txid, action_index, height, recipient_address, value_zat, memo_hex, created_at]
      properties:
        direction:
          type: string
          enum: [incoming, outgoing]
        txid:
          type: string
        action_index:
          type: integer
          format: int32
        height:
          type: integer
          format: int64
        position:
          type: integer
          format: int64
        recipient_address:
          type: string
        value_zat:
          type: integer
          format: int64
        memo_hex:
          type: string
          nullable: true
          description: Hex-encoded 512-byte Orchard memo, or null when no memo is stored
        note_nullifier:
          type: string
          nullable: true
          description: Present for incoming notes; null for OVK-recovered outgoing notes
        ovk_scope:
          type: string
          nullable: true
          description: Present for outgoing notes recovered via OVK
        recipient_scope:
          type: string
          nullable: true
          description: Present when the outgoing recipient scope is known
        pending_spent_txid:
          type: string
        pending_spent_at:
          type: string
          format: date-time
        pending_spent_expiry_height:
          type: integer
          format: int64
        spent_height:
          type: integer
          format: int64
        spent_txid:
          type: string
        created_at:
          type: string
          format: date-time
      additionalProperties: true
    ListWalletNotesResponse:
      type: object
      required: [notes]
      properties:
        notes:
          type: array
          items:
            $ref: "#/components/schemas/WalletNote"
        next_cursor:
          type: string
      additionalProperties: true
    WitnessRequest:
      type: object
      required: [positions]
      properties:
        anchor_height:
          type: integer
          format: int64
          minimum: 0
          description: If omitted, the current scanned tip height is used
        positions:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            type: integer
            minimum: 0
            maximum: 4294967295
      additionalProperties: false
    WitnessPath:
      type: object
      required: [position, auth_path]
      properties:
        position:
          type: integer
          minimum: 0
          maximum: 4294967295
        auth_path:
          type: array
          items:
            type: string
      additionalProperties: true
    WitnessResponse:
      type: object
      required: [status, anchor_height, root, paths]
      properties:
        status:
          type: string
          enum: [ok]
        anchor_height:
          type: integer
          format: int64
        root:
          type: string
        paths:
          type: array
          items:
            $ref: "#/components/schemas/WitnessPath"
      additionalProperties: true
